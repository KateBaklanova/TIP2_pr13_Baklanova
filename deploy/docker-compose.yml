services:
  redis:
    image: redis:7.4
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: unless-stopped

  auth:
    build:
      context: ../
      dockerfile: services/auth/Dockerfile
    container_name: auth
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      - AUTH_HTTP_PORT=8081
      - AUTH_GRPC_PORT=50051
    networks:
      - app-network
    depends_on:
      - redis
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pz13-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - app-network
    restart: unless-stopped

  tasks:
    build:
      context: ../
      dockerfile: services/tasks/Dockerfile
    container_name: tasks
    ports:
      - "8082:8082"
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - QUEUE_NAME=task_events
    networks:
      - app-network
    depends_on:
      - auth
      - redis
      - rabbitmq
    restart: unless-stopped

  worker:
    build:
      context: ../
      dockerfile: services/worker/Dockerfile
    container_name: worker
    environment:
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - QUEUE_NAME=task_events
    networks:
      - app-network
    depends_on:
      - rabbitmq
    restart: unless-stopped

networks:
  app-network:
    driver: bridge